stages:
  - test
  - package
  - release

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - when: never

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_BREAK_SYSTEM_PACKAGES: "1"
  PIP_INDEX_URL: "https://mirrors.ustc.edu.cn/pypi/simple"
  CI_PACKAGE_NAME: "daq-plc-interface"

default:
  image: registry.jihulab.com/discoverrobotics/s2-restricted/data-factory/automation/ubuntu:24.04
  cache:
    key:
      files:
        - pyproject.toml
    paths:
      - .cache/pip

.branch_or_tag_rules:
  tags:
    - tb5z035i/worker-3
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

.ci_runner:
  extends: .branch_or_tag_rules

.ubuntu_apt_packages: &ubuntu_apt_packages
  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends
      python3 python3-venv python3-pip git ca-certificates

test:
  stage: test
  extends: .ci_runner
  before_script:
    - *ubuntu_apt_packages
    - python3 -m pip install --quiet -i "$PIP_INDEX_URL" -e '.[dev]'
  script:
    - python3 -c "from daq_plc_interface import ModbusCtrl, __version__; print(__version__)"
    - python3 -m pytest tests/ -q --tb=short --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 7 days

package:
  stage: package
  extends: .ci_runner
  needs:
    - job: test
      artifacts: false
  before_script:
    - *ubuntu_apt_packages
  script:
    - rm -rf dist ci-artifacts ci-version.env
    - bash scripts/ci-set-release-version.sh
    - set -a && . ./ci-version.env && set +a
    - echo "Building version ${PKG_VERSION}"
    - bash scripts/build-wheel.sh
    - mkdir -p ci-artifacts
    - cp dist/*.whl ci-artifacts/
  artifacts:
    expire_in: 14 days
    paths:
      - ci-artifacts/*.whl

release_packages:
  stage: release
  image: registry.jihulab.com/discoverrobotics/s2-restricted/data-factory/automation/alpine:3.20
  tags:
    - tb5z035i/worker-3
  needs:
    - job: test
      artifacts: false
    - job: package
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - sed -i 's#https://dl-cdn.alpinelinux.org#https://mirrors.ustc.edu.cn#g' /etc/apk/repositories
    - apk update -q
    - apk add --no-cache bash curl python3 ca-certificates
  script:
    - bash scripts/ci-set-release-version.sh
    - bash scripts/ci-publish-gitlab-release.sh
